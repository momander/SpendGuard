<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendGuard - Login</title>
    <link rel="stylesheet" href="src/styles.css">
</head>

<body>
    <div class="login-container">
        <h1>SpendGuard</h1>
        <p>Login to manage purchase requests</p>
        <button id="login-admin-btn" class="btn-primary" style="margin-bottom: 10px;">Log in as an admin</button>
        <button id="login-user-btn" class="btn-primary">Log in as a regular user</button>
    </div>

    <script type="module">
        import { signIn, onAuthStateChanged } from './src/auth.js';

        document.getElementById('login-admin-btn').addEventListener('click', () => signIn('admin'));
        document.getElementById('login-user-btn').addEventListener('click', () => signIn('user'));

        onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>

</html>
